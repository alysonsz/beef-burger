services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: goodhamburger-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQL_SERVER_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "${SQL_SERVER_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U ${SQL_SERVER_USER} -P ${SQL_SERVER_PASSWORD} -C -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 30s
      retries: 15
      start_period: 30s
    networks:
      - beefburger-network

  redis:
    image: redis:7-alpine
    container_name: goodhamburger-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beefburger-network

  api:
    image:
      alysonsz/beefburger-api:latest
    container_name: goodhamburger-api
    ports:
      - "${API_PORT:-5000}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
      - TZ=America/Sao_Paulo
      - ConnectionStrings__DefaultConnection=Server=${SQL_SERVER_HOST:-sqlserver},${SQL_SERVER_PORT:-1433};Database=${SQL_SERVER_DATABASE:-GoodHamburgerDb};User Id=${SQL_SERVER_USER:-sa};Password=${SQL_SERVER_PASSWORD};TrustServerCertificate=True
      - ConnectionStrings__Redis=${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - beefburger-network

  frontend:
    image: 
      alysonsz/beefburger-frontend:latest
    container_name: goodhamburger-frontend
    ports:
      - "5102:80"
    depends_on:
      - api
    networks:
      - beefburger-network

volumes:
  sqlserver-data:
  redis-data:

networks:
  beefburger-network:
    driver: bridge
